# Dracula Theme for Hyprland
# https://draculatheme.com/hyprland

# Import Dracula color scheme
source = ./dracula_colors.conf

# General window settings
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgb(44475a) rgb(bd93f9) 90deg
    col.inactive_border = rgba(44475aaa)
    col.nogroup_border = rgba(282a36dd)
    col.nogroup_border_active = rgb(bd93f9) rgb(44475a) 90deg
    no_border_on_floating = false
    layout = dwindle
}

# Window decoration
decoration {
    rounding = 4

    shadow {
        enabled = true
        range = 60
        color = rgba(1E202966)
        offset = 1 2
        render_power = 3
        scale = 0.97
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
    }

    dim_inactive = false
    dim_strength = 0.1
}

# Window group settings
group {
    col.border_active = $purple
    col.border_inactive = $selection
    col.border_locked_active = $pink
    col.border_locked_inactive = $selection

    groupbar {
        col.active = rgb(bd93f9) rgb(44475a) 90deg
        col.inactive = rgba(282a36dd)
    }
}

# Window rules
windowrule {
    name = windowrule-1
    float = on
    match:title = ^(File Operation Progress)$
}

windowrule {
    name = windowrule-2
    float = on
    match:title = ^(Confirm to replace files)$
}

windowrule {
    name = windowrule-3
    float = on
    match:title = ^(Open File)$
}

windowrule {
    name = windowrule-4
    float = on
    match:title = ^(Save As)$
}

windowrule {
    name = windowrule-5
    float = on
    match:title = ^(Library)$
}

windowrule {
    name = windowrule-6
    float = on
    match:title = ^(Volume Control)$
}

windowrule {
    name = windowrule-7
    float = on
    match:title = ^(Picture-in-Picture)$
}

windowrule {
    name = windowrule-8
    float = on
    match:title = ^(Firefox — Sharing Indicator)$
}

windowrule {
    name = windowrule-9
    float = on
    match:title = ^(DevTools)$
}

windowrule {
    name = windowrule-10
    float = on
    match:title = ^(Open Folder)$
}

windowrule {
    name = windowrule-11
    float = on
    match:title = ^(Select a File)
}

# XWayland border color indicator
windowrulev2 = bordercolor rgb(ff5555),xwayland:1

# Layer rules for Waybar and other layers
layerrule {
    name = layerrule-1
    blur = on
    ignore_alpha = 0
    match:namespace = waybar
}
